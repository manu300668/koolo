<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOLOO - Streetwear Rebelde</title>
  <meta name="description" content="KOLOO - Streetwear rebelde y urbano. Drops exclusivos de camisetas, sudaderas y accesorios.">
  <meta name="keywords" content="streetwear, ropa urbana, camisetas KOLOO, sudaderas KOLOO, moda rebelde">
  <meta name="author" content="KOLOO">

  <!-- Open Graph -->
  <meta property="og:title" content="KOLOO - Streetwear Rebelde">
  <meta property="og:description" content="Drops exclusivos de ropa urbana y accesorios KOLOO.">
  <meta property="og:image" content="imagenes/og-image.webp">
  <meta property="og:url" content="https://koolo.es">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1 class="logo glitch" data-text="KOOLO">KOOLO</h1>
    <p class="tagline">streetwear sin permiso</p>
    <a href="#coleccion" class="cta glitch-btn">ver drop</a>
  </section>

  <!-- BOTÓN CARRITO FLOTANTE -->
  <div class="carrito-flotante" id="carrito-flotante">
    <span id="carrito-count">0</span>
    🛒
  </div>

  <!-- DROP / PRODUCTOS -->
  <section id="coleccion" class="coleccion">
    <h2 class="section-title">drop actual</h2>
    <div class="productos">
      <!-- Producto 1 -->
      <div class="card reveal" style="--delay:0s;">
        <picture>
          <source srcset="imagenes/producto1-600.webp" type="image/webp" media="(max-width:768px)">
          <source srcset="imagenes/producto1-1200.webp" type="image/webp" media="(min-width:769px)">
          <img src="imagenes/producto1-1200.webp" alt="Camiseta KOLOO negra" loading="lazy">
        </picture>
        <h3>koolo tee black</h3>
        <p class="precio">29€</p>
        <button class="btn-cart">añadir al carrito</button>
      </div>
      <!-- Producto 2 -->
      <div class="card reveal" style="--delay:0.15s;">
        <picture>
          <source srcset="imagenes/producto2-600.webp" type="image/webp" media="(max-width:768px)">
          <source srcset="imagenes/producto2-1200.webp" type="image/webp" media="(min-width:769px)">
          <img src="imagenes/producto2-1200.webp" alt="Sudadera KOLOO" loading="lazy">
        </picture>
        <h3>koolo hoodie</h3>
        <p class="precio">59€</p>
        <button class="btn-cart">añadir al carrito</button>
      </div>
      <!-- Producto 3 -->
      <div class="card reveal" style="--delay:0.3s;">
        <picture>
          <source srcset="imagenes/producto3-600.webp" type="image/webp" media="(max-width:768px)">
          <source srcset="imagenes/producto3-1200.webp" type="image/webp" media="(min-width:769px)">
          <img src="imagenes/producto3-1200.webp" alt="Gorra KOLOO" loading="lazy">
        </picture>
        <h3>koolo cap</h3>
        <p class="precio">25€</p>
        <button class="btn-cart">añadir al carrito</button>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="socials">
      <a href="https://www.instagram.com/koolo" target="_blank" aria-label="Instagram">
        <img src="imagenes/instagram.svg" alt="Instagram KOLOO">
      </a>
      <a href="https://www.facebook.com/koolo" target="_blank" aria-label="Facebook">
        <img src="imagenes/facebook.svg" alt="Facebook KOLOO">
      </a>
    </div>
    <div class="pagos">
      <img src="imagenes/visa.svg" alt="Visa">
      <img src="imagenes/mastercard.svg" alt="MasterCard">
      <img src="imagenes/paypal.svg" alt="PayPal">
      <img src="imagenes/bizum.svg" alt="Bizum">
    </div>
    <p>&copy; 2026 KOLOO. Todos los derechos reservados.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
