<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Koolo | Moda urbana</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
    <h1>Koolo</h1>
    <p>Moda urbana · Estilo juvenil</p>
</header>

<section class="hero">
    <h2>Viste tu vibra</h2>
    <p>Ropa casual y urbana para tu día a día</p>
    <a href="#contacto" class="btn">Contacto</a>
</section>

<section class="about">
    <h2>Sobre Koolo</h2>
    <p>Koolo es una marca de ropa urbana pensada para un estilo joven, cómodo y actual.</p>
</section>

<section id="contacto" class="contact">
    <h2>Contacto</h2>
    <form id="contact-form">
        <input type="text" name="from_name" placeholder="Nombre" required>
        <input type="email" name="from_email" placeholder="Email" required>
        <textarea name="message" placeholder="Mensaje" required></textarea>
        <button type="submit">Enviar</button>
    </form>
</section>

<footer>
    <p>© 2026 Koolo · Todos los derechos reservados</p>
</footer>

<script src="script.js"></script>
</body>
</html>
